<body>
    <h3>VALOR EN CONTROLES</h3>

    <label for="caja-texto">Caja texto: </label><input type="text" name="caja-texto" id="texto"><br>
    <label for="caja-num">Caja número: </label><input type="text" name="caja-num" id="numero"><br>
    <label for="caja-psw">Caja password: </label><input type="password" name="caja-psw" id="password"><br>
    <label for="caja-fecha">Caja fecha: </label><input type="date" name="caja-fecha" id="fecha"><br>
    <label for="caja-hora">Caja hora: </label><input type="time" name="caja-hora" id="hora"><br>
    <label for="caja-radio">Caja radio: </label><input type="radio" name="caja-radio" id="radio"><br>
    <label for="caja-check">Caja check: </label><input type="checkbox" name="caja-check" id="check"><br>
    <label for="caja-option">Caja check: </label><select name="caja-option" id="option"><option value="Opcion 1">Opcion 1</option>
    <option value="Opcion 2">Opcion 2</option>
    <option value="Opcion 3">Opcion 3</option></select><br>
    <button id="boton">Capturar valores</button>
