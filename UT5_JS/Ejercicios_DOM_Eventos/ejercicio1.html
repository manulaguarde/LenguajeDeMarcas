<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1</title>
    <link rel="stylesheet" href="ejercicio1.css">
</head>
<body>
    <div class="contenido">
        <h2>EMPEZANDO CON JAVASCRIPT</h2>
        <div class="texto-cuadro">
            <p></p>
        </div>
        <hr>
        <label for="texto-in">Introduce un texto aquí </label><input type="text" name="texto-in" id="texto">
        <hr>
        <div class="colores">
            <label for="fondo">Selecciona color de fondo </label><input type="color" id="colorFondo">
            <label for="borde">Selecciona color del borde </label><input type="color" id="colorBorde">
            <label for="texto">Selecciona color del texto </label><input type="color" id="colorTexto">
        </div>
        <hr>
        <div class="botones">
            <input type="button" value="Cambiar Texto" id="btnTexto">
            <input type="button" value="Cambiar color fondo" id="btnColorFondo">
            <input type="button" value="Cambiar color borde" id="btnColorBorde">
            <input type="button" value="Cambiar color texto" id="btnColorTexto">
        </div>
    </div>
    <script src="ejercicio1.js"></script>
</body>
</html>
