<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3</title>
    <link rel="stylesheet" href="ejercicio3.css">
</head>
<body>
    <form onsubmit="return validar()">
        <div>
            <h2>Solicitud de información</h2>
        </div>
        <div>
            <label for="nombre">Nombre:</label>
        </div>
        <div>
            <input type="text" name="nombre" id="nombre" placeholder="Escribe tu nombre">
        </div>
        <div>
            <label for="correo">Email:</label>
        </div>
        <div>
            <input type="text" name="correo" id="correo" placeholder="Escribe tu email">
        </div>
        <div>
            <label for="asunto">Asunto:</label>
        </div>
       <div>
        <select name="asunto" id="asunto">
            <option value="info">Pedir información</option>
            <option value="estado">Estado de una solicitud</option>
            <option value="otros">Otros</option>
        </select>
       </div>
       <div id="num-solicitud">
            <label for="solicitud">Nº Solicitud:</label><br><br>
            <input type="text" name="solicitud" id="solicitud" placeholder="Escribe el número de solicitud" required>
       </div>
       <div>
            <label for="mensaje">Escribe un mensaje:</label>
       </div>
       <div>
            <input type="text" id="mensaje">
       </div>
       <div>
            <button>Enviar</button>
       </div>

    </form>
    <script src="ejercicio3.js"></script>
</body>
</html>
