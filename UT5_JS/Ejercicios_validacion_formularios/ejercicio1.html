<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1</title>
    <link rel="stylesheet" href="ejercicio1.css">
</head>

<body>
    <h1>Formulario de registro</h1>
    <form id="form1" name="form1" onsubmit='return validar();'>
        <div>
            <label for='nombre'>Nombre *</label>
            <input type='text' name='nombre' id='nombre' />
        </div>
        <div>
            <label for='direccion'>Direccion *</label>
            <input type='text' name='direccion' id='direccion' />
        </div>
        <div>
            <label for='edad'>Edad *</label>
            <input type='text' name='edad' id='edad' />
        </div>
        <div>
            <label for="contrasenia">Contraseña *</label>
            <input type="password" name="contrasenia" id="contrasenia">
        </div>
        <div>
            <label for="contrasenia2">Repite la contraseña *</label>
            <input type="password" name="contrasenia2" id="contrasenia2">
        </div>
        <div>
            <span id="pass-invalida">Las contraseñas no coinciden</span>
        </div>
        <div>
            <label for='estudios'>Nivel de Estudios *</label>
            <select id='estudios' name='estudios'>
            <option value=''>Selecciona</option>
            <option>Ninguno</option>
            <option>Primarios</option>
            <option>Bachiller</option>
            <option>Grado</option>
            <option>Master</option>
            </select>
        </div>
        <div>
            <label>
                <input type='checkbox' value='SI' id='acepto' />
                He leido y acepto las condiciones.
            </label>
        </div>
        <div>
            <span id="error">Algunos campos no son correctos, revísalos</span>
        </div>
        <button>Registrarse</button>
    </form>
    <script src="ejercicio1.js"></script>
</body>

</html>
